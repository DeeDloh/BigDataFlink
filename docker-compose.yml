services:
  postgres:
    image: postgres:15
    container_name: lab3_postgres
    environment:
      POSTGRES_DB: lab3
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - ./sql/init_postgres.sql:/docker-entrypoint-initdb.d/01_init_postgres.sql:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lab3"]
      interval: 5s
      timeout: 5s
      retries: 15

  kafka:
    image: apache/kafka:3.7.0
    container_name: lab3_kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg==
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  kafka-init:
    image: apache/kafka:3.7.0
    container_name: lab3_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic mock-data --partitions 1 --replication-factor 1 && /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list"


  producer:
    build: ./producer
    container_name: lab3_producer
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: mock-data
      DATA_DIR: /data
    volumes:
      - ./data:/data:Z

  flink-jobmanager:
    build: ./flink-job
    container_name: lab3_flink_jm
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: mock-data
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: lab3
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/overview"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  flink-taskmanager:
    build: ./flink-job
    container_name: lab3_flink_tm
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: mock-data
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: lab3
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  flink-submit:
    build: ./flink-job
    container_name: lab3_flink_submit
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      flink-jobmanager:
        condition: service_healthy
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: mock-data
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: lab3
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command: bash -c "/opt/flink/bin/flink run --detached -m flink-jobmanager:8081 -py /app/job.py"